{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Fees Management</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                  <li class="breadcrumb-item active">Fees</li>
               </ul>
            </div>
            <div class="col-auto text-right float-right ml-auto">
               <a href="#" class="btn btn-primary"><i class="fas fa-plus"></i> Add Invoice</a>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card card-table">
               <div class="card-body">
                  <div class="table-responsive">
                     <table class="table table-hover table-center mb-0 datatable">
                        <thead>
                           <tr>
                              <th>ID ID</th>
                              <th>Student Name</th>
                              <th>Fee Type</th>
                              <th>Amount</th>
                              <th>Status</th>
                              <th class="text-right">Action</th>
                           </tr>
                        </thead>
                        <tbody>
                           <tr>
                              <td>INV-001</td>
                              <td>John Doe</td>
                              <td>Tuition</td>
                              <td>$1500</td>
                              <td><span class="badge badge-success">Paid</span></td>
                              <td class="text-right">
                                 <div class="actions">
                                    <a href="#" class="btn btn-sm bg-success-light mr-2"><i class="fas fa-eye"></i></a>
                                 </div>
                              </td>
                           </tr>
                           <tr>
                              <td>INV-002</td>
                              <td>Jane Smith</td>
                              <td>Library Fee</td>
                              <td>$50</td>
                              <td><span class="badge badge-danger">Unpaid</span></td>
                              <td class="text-right">
                                 <div class="actions">
                                    <a href="#" class="btn btn-sm bg-success-light mr-2"><i class="fas fa-eye"></i></a>
                                 </div>
                              </td>
                           </tr>
                        </tbody>
                     </table>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>
{% endblock %}
