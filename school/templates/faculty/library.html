{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Library Books</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                  <li class="breadcrumb-item active">Library</li>
               </ul>
            </div>
            <div class="col-auto text-right float-right ml-auto">
               <a href="#" class="btn btn-primary"><i class="fas fa-plus"></i> Add Book</a>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card card-table">
               <div class="card-body">
                  <div class="table-responsive">
                     <table class="table table-hover table-center mb-0 datatable">
                        <thead>
                           <tr>
                              <th>ID</th>
                              <th>Book Name</th>
                              <th>Subject</th>
                              <th>Publisher</th>
                              <th>Status</th>
                              <th class="text-right">Action</th>
                           </tr>
                        </thead>
                        <tbody>
                           <tr>
                              <td>LIB-A01</td>
                              <td>Advanced Python Patterns</td>
                              <td>Computer Science</td>
                              <td>O'Reilly Media</td>
                              <td><span class="badge badge-success">Available</span></td>
                              <td class="text-right">
                                 <div class="actions">
                                    <a href="#" class="btn btn-sm bg-success-light mr-2"><i class="fas fa-eye"></i></a>
                                 </div>
                              </td>
                           </tr>
                           <tr>
                              <td>LIB-H09</td>
                              <td>European History 101</td>
                              <td>History</td>
                              <td>Penguin Books</td>
                              <td><span class="badge badge-warning">Issued</span></td>
                              <td class="text-right">
                                 <div class="actions">
                                    <a href="#" class="btn btn-sm bg-success-light mr-2"><i class="fas fa-eye"></i></a>
                                 </div>
                              </td>
                           </tr>
                        </tbody>
                     </table>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>
{% endblock %}
