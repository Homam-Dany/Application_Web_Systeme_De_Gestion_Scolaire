{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row">
                <div class="col-sm-12">
                    <h3 class="page-title">My Profile Settings</h3>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-lg-8 col-md-12 mx-auto">
                <div class="card">
                    <div class="card-body">
                        {% if messages %}
                        <div class="alert alert-success">
                            {% for message in messages %}{{ message }}{% endfor %}
                        </div>
                        {% endif %}
                        <form method="POST">
                            {% csrf_token %}
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">Username / Email</label>
                                <div class="col-lg-9">
                                    <input type="text" class="form-control" value="{{ request.user.username }}" disabled>
                                    <small class="form-text text-muted">Your email cannot be changed.</small>
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">First Name</label>
                                <div class="col-lg-9">
                                    <input type="text" class="form-control" name="first_name" value="{{ request.user.first_name }}">
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">Last Name</label>
                                <div class="col-lg-9">
                                    <input type="text" class="form-control" name="last_name" value="{{ request.user.last_name }}">
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">New Password</label>
                                <div class="col-lg-9">
                                    <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current password">
                                </div>
                            </div>
                            <div class="text-right">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        
                        <h5 class="text-danger mb-3">Danger Zone</h5>
                        <form method="POST" onsubmit="return confirm('Are you sure you want to permanently delete your account? This action cannot be undone.');">
                            {% csrf_token %}
                            <input type="hidden" name="delete_account" value="1">
                            <button type="submit" class="btn btn-outline-danger btn-block">Delete My Account</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
